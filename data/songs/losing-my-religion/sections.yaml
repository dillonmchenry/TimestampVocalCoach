#       start_s: float
#       end_s: float
#       kind: optional[str]  # one of: intro, verse, pre_chorus, chorus, bridge, refrain, outro
#
# When this file is present it OVERRIDES the auto-derived "Phrase N" sections
# built from UltraStar phrase breaks in vocal_coach/song.py.

